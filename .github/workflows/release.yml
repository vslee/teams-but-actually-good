name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-extensions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install

      - name: Build Chrome extension
        run: bun run build:ext

      - name: Build Firefox extension
        run: bun run build:ext:firefox

      - name: Generate injection metadata
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256="$(shasum -a 256 dist/injection.js | awk '{print $1}')"
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -n \
            --arg version "$VERSION" \
            --arg sha256 "$SHA256" \
            --arg published_at "$PUBLISHED_AT" \
            --arg notes "Release ${GITHUB_REF_NAME}" \
            '{version:$version,sha256:$sha256,published_at:$published_at,notes:$notes}' \
            > dist/injection.meta.json

      - name: Create source archive
        run: git archive HEAD --format=zip -o dist/source.zip

      - name: Upload extensions
        uses: actions/upload-artifact@v4
        with:
          name: extensions
          path: |
            dist/extension-chrome.zip
            dist/extension-firefox.zip
            dist/injection.js
            dist/injection.meta.json

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: source-archive
          path: dist/source.zip

  # Build desktop apps
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            tauri_args: --target x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            tauri_args: --target x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install deps
        run: bun install

      - name: Build (dist/)
        run: bun run build

      - name: Build & Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Teams but (actually) good ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri_args }}

  build-safari:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install

      - name: Build Safari extension resources
        run: bun run build:safari

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode -o "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Archive macOS Safari app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project "safari-extension/Teams but (actually) good/Teams but (actually) good.xcodeproj" \
            -scheme "Teams but (actually) good (macOS)" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/TeamsButActuallyGood.xcarchive" \
            CODE_SIGN_IDENTITY="$APPLE_SIGNING_IDENTITY" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_STYLE=Manual

      - name: Export signed app
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/TeamsButActuallyGood.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/safari-export"

      - name: Notarize & staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="$RUNNER_TEMP/safari-export/Teams but (actually) good.app"
          zip -r "$RUNNER_TEMP/notarize.zip" "$APP_PATH"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP_PATH"

      - name: Package macOS Safari app
        run: |
          mkdir -p dist
          zip -r "dist/safari-extension-macos.zip" "$RUNNER_TEMP/safari-export/Teams but (actually) good.app"

      - name: Upload Safari artifact
        uses: actions/upload-artifact@v4
        with:
          name: safari-extension
          path: dist/safari-extension-macos.zip

  publish-stores:
    needs: [build-extensions]
    runs-on: ubuntu-latest
    steps:
      - name: Download extensions
        uses: actions/download-artifact@v4
        with:
          name: extensions
          path: dist/

      - name: Download source archive
        uses: actions/download-artifact@v4
        with:
          name: source-archive
          path: dist/

      - name: Publish to Chrome Web Store
        uses: wdzeng/chrome-extension@v1
        with:
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          zip-path: dist/extension-chrome.zip
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Publish to Firefox Add-ons
        uses: wdzeng/firefox-addon@v1
        with:
          addon-guid: teams-but-good@leonimust
          xpi-path: dist/extension-firefox.zip
          jwt-issuer: ${{ secrets.FIREFOX_JWT_ISSUER }}
          jwt-secret: ${{ secrets.FIREFOX_JWT_SECRET }}
          source-file-path: dist/source.zip

      - name: Publish to Microsoft Edge Add-ons
        uses: wdzeng/edge-addon@v2
        with:
          product-id: ${{ secrets.EDGE_PRODUCT_ID }}
          zip-path: dist/extension-chrome.zip
          api-key: ${{ secrets.EDGE_API_KEY }}
          client-id: ${{ secrets.EDGE_CLIENT_ID }}

  attach-extensions:
    needs: [build-desktop, build-extensions, build-safari]
    runs-on: ubuntu-latest
    steps:
      - name: Download extensions
        uses: actions/download-artifact@v4
        with:
          name: extensions
          path: dist/

      - name: Download Safari extension
        uses: actions/download-artifact@v4
        with:
          name: safari-extension
          path: dist/

      - name: Attach extensions to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/extension-chrome.zip
            dist/extension-firefox.zip
            dist/safari-extension-macos.zip
            dist/injection.js
            dist/injection.meta.json
          draft: true
